name: Weekly Auto Blog Update

on:
  schedule:
    # Every Friday at 08:00 UTC
    - cron: '0 8 * * 5'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Automation Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # We can run a standalone script or use tsx to call the service
          npx tsx -e "import { runAutomation } from './src/services/automation.ts'; runAutomation().then(() => console.log('Done')).catch(err => { console.error(err); process.exit(1); })"

      - name: Commit and Push changes
        run: |
          git config --global user.name "TechPulse AI Bot"
          git config --global user.email "bot@techpulse.ai"
          git add src/data/posts.json
          git commit -m "chore: weekly automated blog update [skip ci]" || echo "No changes to commit"
          git push
