name: "AI Blog - Generate Weekly Post"

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate AI Post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npx tsx -e "import { runAutomation } from './src/services/automation.ts'; runAutomation()"

      - name: Commit Generated Post
        run: |
          git config --global user.name "AI Bot"
          git config --global user.email "bot@github.com"
          git add src/data/posts.json
          git commit -m "Auto-Post: Weekly Intel [skip ci]" || echo "Nothing to commit"
          git push origin main
