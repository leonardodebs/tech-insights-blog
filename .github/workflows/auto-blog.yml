name: "AI Blog - Generate Daily Post"

on:
  schedule:
    - cron: '0 21 * * *' # Todos os dias às 21:00 UTC (18:00 Brasília)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate AI Post
        id: generate
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx -e "import { runAutomation } from './src/services/automation.ts'; runAutomation().then(() => process.exit(0)).catch((e) => { console.error(e); process.exit(1); })"

      - name: Post to LinkedIn
        id: linkedin
        if: steps.generate.outcome == 'success'
        continue-on-error: true
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: npx tsx scripts/post-to-linkedin.ts

      - name: Notify failure via GitHub Issue
        if: steps.generate.outcome == 'failure' || steps.linkedin.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date '+%Y-%m-%d')
          EXISTING=$(gh issue list --label "ci-failure" --search "Falha na geração $TODAY" --json number --jq 'length')
          if [ "$EXISTING" -eq "0" ]; then
            BODY="Falha detectada em $TODAY.\n\nVerifique os [logs do workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) para detalhes.\n\n"
            if [ "${{ steps.generate.outcome }}" == "failure" ]; then
              BODY="${BODY}❌ **Geração de post falhou.**\nPossíveis causas:\n- API do Claude sobrecarregada (529)\n- Chave ANTHROPIC_API_KEY expirada ou inválida\n- Validação de qualidade não aprovada após todas as tentativas\n\n"
            fi
            if [ "${{ steps.linkedin.outcome }}" == "failure" ]; then
              BODY="${BODY}❌ **Publicação no LinkedIn falhou.**\nPossíveis causas:\n- LINKEDIN_ACCESS_TOKEN expirado (expira a cada ~60 dias, sem renovação automática — é preciso refazer a autorização OAuth manualmente)\n- Permissões do app do LinkedIn revogadas\n- Erro transitório da API do LinkedIn\n\n"
            fi
            gh issue create \
              --title "⚠️ Falha na geração de post: $TODAY" \
              --body "$BODY" \
              --label "ci-failure"
          fi
          echo "⚠️ Falha detectada. Issue criada no GitHub."

      - name: Build Site
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Commit and Push Data
        if: steps.generate.outcome == 'success'
        run: |
          git config --global user.name "AI Bot"
          git config --global user.email "bot@github.com"
          git add src/data/posts.json
          git commit -m "Auto-Post: Data Sync [skip ci]" || echo "Nothing to commit"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
